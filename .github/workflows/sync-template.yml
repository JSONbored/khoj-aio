name: Sync Template to Awesome-Unraid

on:
  push:
    paths:
      - 'khoj-aio.xml'
      - 'assets/khoj.png'
      - '.github/workflows/sync-template.yml'
    branches:
      - main

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v5

      - name: Checkout Target Repository
        uses: actions/checkout@v5
        with:
          repository: JSONbored/awesome-unraid
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo

      - name: Copy and Commit Template
        run: |
          cp khoj-aio.xml target-repo/khoj-aio.xml
          mkdir -p target-repo/icons
          if [ -f assets/khoj.png ]; then
            cp assets/khoj.png target-repo/icons/khoj.png
          fi
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add khoj-aio.xml
          if [ -f icons/khoj.png ]; then
            git add icons/khoj.png
          fi
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync khoj-aio assets from upstream" && git push)
