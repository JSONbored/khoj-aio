name: CI / Khoj AIO

on:
  push:
    branches: [main]
    paths:
      - .github/**
      - .github/workflows/**
      - .trunk/**
      - AGENTS.md
      - CHANGELOG.md
      - Dockerfile
      - README.md
      - SECURITY.md
      - SUPPORT.md
      - assets/**
      - cliff.toml
      - components.toml
      - components/**
      - docs/**
      - docs/upstream/**
      - khoj-aio.xml
      - pyproject.toml
      - renovate.json
      - requirements-dev.txt
      - rootfs/**
      - scripts/**
      - tests/**
      - upstream.toml
  pull_request:
    branches: [main]
    paths:
      - .github/**
      - .github/workflows/**
      - .trunk/**
      - AGENTS.md
      - CHANGELOG.md
      - Dockerfile
      - README.md
      - SECURITY.md
      - SUPPORT.md
      - assets/**
      - cliff.toml
      - components.toml
      - components/**
      - docs/**
      - docs/upstream/**
      - khoj-aio.xml
      - pyproject.toml
      - renovate.json
      - requirements-dev.txt
      - rootfs/**
      - scripts/**
      - tests/**
      - upstream.toml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aio-build:
    uses: JSONbored/aio-fleet/.github/workflows/aio-build.yml@5426c8638dc2bb2bf1faa355d9db786ad044c7fa
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      app_slug: khoj-aio
      image_name: jsonbored/khoj-aio
      workflow_title: CI / Khoj AIO
      docker_cache_scope: khoj-aio-image
      pytest_image_tag: khoj-aio:pytest
      publish_profile: changelog-version
      upstream_name: Khoj
      image_description: Unraid-first AIO wrapper image for Khoj
      python_version: "3.13"
      trunk_org_slug: aethereal
      publish_platforms: linux/amd64,linux/arm64
      checkout_submodules: false
      integration_pytest_args: tests/integration -m integration
      run_extended_integration: false
      extended_integration_pytest_args: ""
      generator_check_command: ""
      upstream_digest_arg: UPSTREAM_IMAGE_DIGEST
      catalog_published: true
      xml_paths: |
        khoj-aio.xml
      extra_publish_paths: |

      catalog_assets: |
        khoj-aio.xml|khoj-aio.xml
    secrets: inherit
