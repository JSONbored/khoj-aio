name: Build Khoj-AIO

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'khoj-aio.xml'
      - 'assets/**'
      - 'rootfs/**'
      - 'scripts/**'
      - 'upstream.toml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'khoj-aio.xml'
      - 'assets/**'
      - 'rootfs/**'
      - 'scripts/**'
      - 'upstream.toml'
      - '.github/workflows/build.yml'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      run_smoke_test:
        description: "Run the smoke-test job"
        required: false
        default: false
        type: boolean
      publish_image:
        description: "Publish image tags from the current ref"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: jsonbored/khoj-aio

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-template:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Validate shell and python scripts
        run: |
          bash -n scripts/smoke-test.sh
          PYTHONPYCACHEPREFIX=/tmp/khoj-aio-pyc python3 -m py_compile scripts/check-upstream.py
          find rootfs -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          find rootfs -type f -path '*/run' -print0 | xargs -0 -n1 bash -n

      - name: Validate XML
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse('khoj-aio.xml')
          print('khoj-aio.xml parsed successfully')
          PY

  pinned-actions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Enforce pinned action SHAs
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          workflow_dir = pathlib.Path(".github/workflows")
          pattern = re.compile(r"^\s*uses:\s*([^@\s]+)@([^\s#]+)")
          sha_pattern = re.compile(r"^[0-9a-f]{40}$")
          failures = []

          for path in sorted(workflow_dir.glob("*.yml")):
              for lineno, line in enumerate(path.read_text().splitlines(), start=1):
                  match = pattern.match(line)
                  if not match:
                      continue
                  target, ref = match.groups()
                  if target.startswith("./"):
                      continue
                  if not sha_pattern.fullmatch(ref):
                      failures.append(f"{path}:{lineno}: action is not pinned to a full SHA -> {line.strip()}")

          if failures:
              print("\n".join(failures), file=sys.stderr)
              sys.exit(1)
          print("All workflow actions are pinned to full commit SHAs.")
          PY

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4.8.2

  smoke-test:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.run_smoke_test == true) }}
    needs:
      - validate-template
      - pinned-actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build local test image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: khoj-aio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          chmod +x scripts/smoke-test.sh
          export KEEP_SMOKE_ARTIFACTS=1
          export READY_TIMEOUT_SECONDS=600
          export HTTP_TIMEOUT_SECONDS=120
          bash -x ./scripts/smoke-test.sh khoj-aio:ci

      - name: Dump smoke test diagnostics
        if: failure()
        run: |
          echo "Active containers:"
          docker ps -a
          echo
          echo "Inspecting smoke container:"
          docker inspect khoj-aio-smoke || true
          echo
          echo "Container logs:"
          docker logs khoj-aio-smoke || true

  publish:
    if: ${{ github.event_name != 'pull_request' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.publish_image == true)) }}
    needs:
      - validate-template
      - pinned-actions
      - smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: prep
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          sha_tag="${image}:sha-${GITHUB_SHA}"
          aio_version="aio-v1"
          upstream_version="$(sed -n 's/^ARG UPSTREAM_VERSION=//p' Dockerfile | head -n1)"

          {
            echo "upstream_version=${upstream_version}"
            echo "tags<<EOF"
            echo "${image}:latest"
            if [[ -n "${upstream_version}" ]]; then
              echo "${image}:${upstream_version}"
              echo "${image}:${upstream_version}-${aio_version}"
              if [[ "${upstream_version}" == *-* ]]; then
                echo "${image}:pre"
              else
                upstream_no_v="${upstream_version#v}"
                IFS='.' read -r major minor patch <<< "${upstream_no_v}"
                if [[ -n "${major:-}" ]]; then
                  echo "${image}:v${major}"
                fi
                if [[ -n "${major:-}" && -n "${minor:-}" ]]; then
                  echo "${image}:v${major}.${minor}"
                fi
              fi
            fi
            echo "${sha_tag}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/JSONbored/khoj-aio
            org.opencontainers.image.title=khoj-aio
            org.opencontainers.image.version=${{ steps.prep.outputs.upstream_version || '' }}
            io.jsonbored.upstream.name=Khoj
          load: false

  sync-awesome-unraid:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - validate-template
      - pinned-actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify sync token is present
        id: token
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [[ -n "${SYNC_TOKEN}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "SYNC_TOKEN is not configured; skipping sync."
          fi

      - name: Checkout Source Repository
        if: ${{ steps.token.outputs.enabled == 'true' }}
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Checkout Target Repository
        if: ${{ steps.token.outputs.enabled == 'true' }}
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: JSONbored/awesome-unraid
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo

      - name: Copy and Commit Template
        if: ${{ steps.token.outputs.enabled == 'true' }}
        run: |
          cp khoj-aio.xml target-repo/khoj-aio.xml
          mkdir -p target-repo/icons
          if [ -f assets/khoj.png ]; then
            cp assets/khoj.png target-repo/icons/khoj.png
          fi
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add khoj-aio.xml
          if [ -f icons/khoj.png ]; then
            git add icons/khoj.png
          fi
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync khoj-aio assets from upstream" && git push)
